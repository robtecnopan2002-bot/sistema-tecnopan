<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - RCB Investimentos</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .card-cadastro { border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 550px; background: white; padding: 30px; }
        .btn-cadastro { background-color: #010e21; color: white; font-weight: bold; border: none; padding: 12px; border-radius: 10px; width: 100%; transition: 0.3s; }
        .btn-cadastro:hover { background-color: #caa252; color: #010e21; }
    </style>
</head>
<body>

    <div class="card-cadastro m-3" id="conteudoCard">
        <div id="areaFormulario">
            <h3 class="text-center fw-bold mb-2 text-dark">Crie sua Conta</h3>
            <p class="text-center text-muted small mb-4">Insira seus dados para começar a renderizar seu capital na <span class="fw-bold text-dark">RCB</span>.</p>

            <form id="formCadastro">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nome Completo</label>
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">CPF</label>
                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">Telefone</label>
                        <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-5 mb-3">
                        <label class="form-label small fw-bold">CEP</label>
                        <input type="text" class="form-control" id="cep" placeholder="00000-000" maxlength="9" required>
                    </div>
                    <div class="col-md-7 mb-3">
                        <label class="form-label small fw-bold">E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="seuemail@provedor.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Senha de Acesso</label>
                    <input type="password" class="form-control" id="senha" placeholder="Crie uma senha segura" required>
                </div>

                <button type="submit" class="btn-cadastro mb-3" id="btnEnviar">Concluir Cadastro</button>
                
                <div class="text-center">
                    <a href="index.html" class="text-decoration-none small text-secondary">← Voltar para o Simulador</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Elemento invisível de suporte para quebrar as travas de segurança CORS do Google -->
    <iframe name="iframeOculto" id="iframeOculto" style="display:none;"></iframe>

    <script>
        const URL_API_GOOGLE = "https://script.google.com/macros/library/d/12HHrRalQZ9FwcjhzExmq-FQjFKMZdWwG-QbxwRsY5A39RnIOwtodjszB/8";
        let intervaloMonitoramento = null;

        // MÁSCARAS DE INPUTS
        document.getElementById('cpf').addEventListener('input', e => {
            e.target.value = e.target.value.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        });
        document.getElementById('telefone').addEventListener('input', e => {
            e.target.value = e.target.value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2');
        });
        document.getElementById('cep').addEventListener('input', e => {
            e.target.value = e.target.value.replace(/\D/g, '').replace(/^(\d{5})(\d)/, '$1-$2');
        });

        function iniciarMonitoramentoStatus(emailCliente) {
            intervaloMonitoramento = setInterval(async () => {
                try {
                    // Usamos o formato JSONP ou texto para evitar o bloqueio na leitura do status
                    const resposta = await fetch(`${URL_API_GOOGLE}?action=checarStatus&email=${emailCliente}`);
                    const dados = await resposta.json();
                    if (dados && dados.status === "Ativo") {
                        clearInterval(intervaloMonitoramento); 
                        window.location.href = "aportes.html"; 
                    }
                } catch (erro) {
                    console.log("Checando aprovação...");
                }
            }, 5000); 
        }

        function irParaHome() {
            if (intervaloMonitoramento) { clearInterval(intervaloMonitoramento); }
            window.location.href = "index.html?status=analise";
        }

        function mostrarMensagemSucesso(emailCliente) {
            document.getElementById('conteudoCard').innerHTML = `
                <div class="text-center py-4">
                    <div class="spinner-border text-dark mb-4" role="status" style="width: 3rem; height: 3rem;"></div>
                    <h3 class="fw-bold text-dark mb-3">Cadastro em Análise...</h3>
                    <p class="text-secondary mb-4" style="line-height: 1.6;">
                        Seus dados foram enviados com sucesso! Nossa equipe administrativa está revisando suas informações neste momento.
                    </p>
                    <p class="text-muted small mb-4">Fique à vontade para voltar ao início e continuar simulando enquanto aprovamos sua conta.</p>
                    <hr class="my-4">
                    <div class="text-center">
                        <button onclick="irParaHome()" class="btn btn-dark fw-bold py-2 px-4 rounded-3 text-white border-0" style="background-color: #010e21;">🏠 Voltar à Página Inicial</button>
                    </div>
                </div>
            `;
            iniciarMonitoramentoStatus(emailCliente);
        }

        // ENVIO BLINDADO VIA CONVERSÃO DE FORMULÁRIO DINÂMICO
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnEnviar');
            const emailDigitado = document.getElementById('email').value;
            btn.innerText = "Processando cadastro..."; btn.disabled = true;

            // Cria um formulário tradicional oculto que o Google aceita sem validar CORS
            const formInvisivel = document.createElement('form');
            formInvisivel.method = 'POST';
            formInvisivel.action = URL_API_GOOGLE;
            formInvisivel.target = 'iframeOculto';

            const dadosFormulario = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                cep: document.getElementById('cep').value,
                email: emailDigitado,
                senha: document.getElementById('senha').value
            };

            // Injeta o texto JSON dentro de um campo estruturado
            const inputDados = document.createElement('input');
            inputDados.type = 'hidden';
            inputDados.name = 'dadosJSON';
            inputDados.value = JSON.stringify(dadosFormulario);
            
            formInvisivel.appendChild(inputDados);
            document.body.appendChild(formInvisivel);
            
            // Dispara o envio direto para o Google Drive através do túnel de segurança
            formInvisivel.submit();
            
            // Remove o formulário lixo da tela e exibe a mensagem de sucesso na hora
            setTimeout(() => {
                formInvisivel.remove();
                mostrarMensagemSucesso(emailDigitado);
            }, 1000);
        });
    </script>
</body>
</html>
